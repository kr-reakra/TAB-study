<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Playlist</title>
    <link rel="stylesheet" href="playlist.css">
</head>
<body>
    <div class="card">
        <div class="card-header">
            <span>✕</span>
            <span class="header-title">Playlist</span>
        </div>

        <div class="album-section">
            <div class="album-art">🖼️</div>
            <div class="album-info">
                <h2>Random Love</h2>
                <p>by Divay Kapoor</p>
            </div>
        </div>

        <div class="controls">
            <button class="play-btn">▶ PLAY</button>
            <button class="circle-btn">♥</button>
            <button class="circle-btn">+</button>
        </div>

        <div class="song-list">
            <div class="song-item">
            <div class="thumb red"></div>
            <div class="song-info">
                <h4>Matargasti</h4>
                <p>Mohit Chauhan</p>
            </div>
        </div>
        <div class="song-item">
            <div class="thumb pink"></div>
            <div class="song-info">
                <h4>Attitude</h4>
                <p>Lewis OfMan</p>
            </div>
        </div>
        <div class="song-item">
            <div class="thumb blue"></div>
            <div class="song-info">
                <h4>Try Everything</h4>
                <p>Shakira Zootopia</p>
            </div>
        </div>
        <div class="song-item">
            <div class="thumb gray"></div>
            <div class="song-info">
                <h4>Sunflower</h4>
                <p>Joseph Vincent</p>
            </div>
        </div>
    </div>
</div>
        </div>
    </div>
</body>
</html>
